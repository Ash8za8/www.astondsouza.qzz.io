<!DOCTYPE html>
<html>
<head>
<title>TechStore</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f6f6f7;
}

header{
background:#008060;
color:white;
padding:20px 8%;
display:flex;
justify-content:space-between;
}

.hero{
padding:100px 8%;
text-align:center;
background:white;
}

.hero h1{
font-size:3rem;
margin-bottom:15px;
}

.hero p{
color:#666;
}

.products{
padding:60px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.price{
color:#008060;
font-weight:bold;
font-size:1.2rem;
}

button{
width:100%;
padding:12px;
border:none;
background:#008060;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

footer{
text-align:center;
padding:30px;
background:#111;
color:white;
}
</style>
</head>

<body>

<header>
<h2>TechStore</h2>
<div>🛒 Cart (0)</div>
</header>

<section class="hero">
<h1>Everything You Need</h1>
<p>Modern Shopify-style online store demo.</p>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800">
<div class="card-content">
<h3>Smartphone</h3>
<p class="price">149 OMR</p>
<button>Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=800">
<div class="card-content">
<h3>Smart Watch</h3>
<p class="price">59 OMR</p>
<button>Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800">
<div class="card-content">
<h3>Headphones</h3>
<p class="price">39 OMR</p>
<button>Add To Cart</button>
</div>
</div>

</section>

<footer>
Sample E-Commerce Website
</footer>

</body>
</html>
