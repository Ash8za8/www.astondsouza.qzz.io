<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
scroll-behavior:smooth;
}

body{
background:#0f172a;
color:white;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(15,23,42,0.9);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:14px;
}

nav a:hover{
color:#2563eb;
}

/* HERO */
.hero{
padding:140px 8% 60px;
text-align:center;
}

.hero img{
width:160px;
height:160px;
border-radius:50%;
object-fit:cover;
border:4px solid #2563eb;
}

.hero h1{
font-size:3rem;
margin-top:20px;
}

.hero p{
color:#cbd5e1;
margin-top:10px;
}

/* SKILLS */
.skills{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:30px 8%;
}

.skill{
background:#2563eb;
padding:8px 16px;
border-radius:50px;
font-size:13px;
}

/* PROJECTS */
.projects{
padding:60px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.project{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:0.3s;
position:relative;
}

.project:hover{
transform:translateY(-10px);
}

.project img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.project-content{
padding:20px;
}

/* hover overlay */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:220px;
background:rgba(37,99,235,0.8);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:0.3s;
font-weight:600;
}

.project:hover .overlay{
opacity:1;
}

/* CTA */
.cta{
text-align:center;
padding:70px 8%;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
margin-top:20px;
}

footer{
text-align:center;
padding:30px;
background:#020617;
}
</style>
</head>

<body>

<nav>
<h3>John Smith</h3>
<div>
<a href="#home">Home</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section class="hero" id="home">

<img src="https://assets.epuzzle.info/puzzle/118/059/original.jpg">

<h1>John Smith</h1>
<p>UI/UX Designer & Front-End Developer</p>

</section>

<div class="skills">
<div class="skill">Web Design</div>
<div class="skill">UI/UX</div>
<div class="skill">Frontend</div>
<div class="skill">Branding</div>
</div>

<section class="projects" id="projects">

<div class="project">
<div class="overlay">View Project</div>
<img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1000">
<div class="project-content">
<h3>Business Website</h3>
</div>
</div>

<div class="project">
<div class="overlay">View Project</div>
<img src="https://images.unsplash.com/photo-1556740749-887f6717d7e4?w=1000">
<div class="project-content">
<h3>E-Commerce Store</h3>
</div>
</div>

<div class="project">
<div class="overlay">View Project</div>
<img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1000">
<div class="project-content">
<h3>Restaurant Website</h3>
</div>
</div>

</section>

<section class="cta" id="contact">
<h2>Want a Website Like This?</h2>
<a href="../index.html#contact" class="btn">Get This Website</a>
</section>

<footer>
Sample Portfolio Website
</footer>

</body>
</html>
